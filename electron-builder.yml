appId: com.tcfnet.sip-cms
productName: SIP COMMANDER
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/*.map"
win:
  target:
    - dir
  icon: build/icon.png
  artifactName: ${productName}-${version}.${ext}
  # The app adds temporary secondary IPs / routes (netsh) to reach cross-subnet
  # devices — that needs elevation. Without this the app runs un-elevated under
  # UAC and all network-config commands fail silently.
  requestedExecutionLevel: requireAdministrator
linux:
  target:
    - dir
  icon: build/icon.png
  category: Network
  artifactName: ${productName}-${version}.${ext}
asar: true
npmRebuild: false
