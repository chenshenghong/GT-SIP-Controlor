<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════
   0. 設定常數 (安全策略集中於此，方便依現場調整)
   ══════════════════════════════════════════════════════════════════ */
const CFG = {
  DEFAULT_USER:      "admin",
  DEFAULT_PASSWORD:  "123456",      // 偵測到此密碼 → 強制修改 (Grandstream 行為)
  IDLE_LOGOUT_MS:    5 * 60 * 1000, // 閒置自動登出
  TOKEN_LIFETIME_S:  3600,          // 韌體 token 有效期
  MAX_LOGIN_TRIES:   5,             // 前端登入鎖定門檻 (韌體未實作 A005)
  LOCKOUT_MS:        5 * 60 * 1000, // 鎖定時間
  POLL_MS:           4000,          // 儀表板輪詢 (設備單執行緒，勿過密)
  REQ_TIMEOUT_MS:    8000,
  REQ_RETRY:         1,
  REBOOT_COUNTDOWN:  45,            // 重啟倒數秒
  PW_MIN_LEN:        8,             // 前端密碼強度政策 (韌體未強制)
};

/* ══════════════════════════════════════════════════════════════════
   1. API 層
      · 同源相對路徑 (由設備提供時)；可用「進階」覆寫 base。
      · GBK 解碼 + 髒資料(控制字元)清洗 → JSON.parse
      · 單一 in-flight 佇列 (設備單執行緒) + timeout + 重試
      · 自動帶 Authorization；A002/A003 → 踢回登入
   ══════════════════════════════════════════════════════════════════ */
const Session = {
  token: null, user: null, base: "",
  loginPassWasDefault: false,
  save(){ try{ sessionStorage.setItem("sip_sess", JSON.stringify(
            {token:this.token,user:this.user,base:this.base,pwd:this.loginPassWasDefault})); }catch(e){} },
  load(){ try{ const s=JSON.parse(sessionStorage.getItem("sip_sess")||"null");
            if(s){this.token=s.token;this.user=s.user;this.base=s.base||"";
                  this.loginPassWasDefault=!!s.pwd;} }catch(e){} },
  clear(){ this.token=null;this.user=null;this.loginPassWasDefault=false;
            try{ sessionStorage.removeItem("sip_sess"); }catch(e){} },
};

const gbk = (typeof TextDecoder!=="undefined") ? new TextDecoder("gbk") : null;
let _chain = Promise.resolve();        // 序列化佇列

// 韌體 bug 暫時修補 (需求單 FW-01)：/get/device/status 的 broadcast_volume 鍵被韌體輸出成
//   少了收尾引號與冒號的無效 JSON (websetsip.c 第 572 行格式字串錯字)；下方 cleanDirtyJSON 的
//   .replace 會還原成合法鍵，對已修正韌體不會誤命中，工廠修好出貨後可移除。
function cleanDirtyJSON(text){
  // 韌體 Response 結尾常夾帶非法控制字元 (含 token 尾端的 \n)；移除後才能 parse
  let t = text.replace(/[\u0000-\u001F\u007F-\u009F]/g, "").replace(/"broadcast_volume:(\s)/g, '"broadcast_volume":$1');
  // 韌體 bug 暫時修補 (需求單 FW-02)：/get/device/status 少了 root 物件收尾 } (韌體格式字串
  //   結尾 }} 應為 }}})。僅針對該端點簽章 (起首 "sip_status") 補一個 }，對已修韌體不誤動。
  t = t.trim();
  if (/^\{\s*"sip_status"/.test(t) && /\}\}$/.test(t) && !/\}\}\}$/.test(t)) t += "}";
  return t;
}

async function rawRequest(method, path, body, tok, base){
  // tok/base 由 api() 在排隊當下快照傳入；未傳則取現值 (login 直接呼叫時)
  if(tok===undefined) tok = Session.token;
  if(base===undefined) base = Session.base;
  const url = (base||"") + path;
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), CFG.REQ_TIMEOUT_MS);
  const headers = { "Accept":"application/json" };
  if(body!==undefined) headers["Content-Type"] = "application/json";
  if(tok && path!=="/auth/login") headers["Authorization"] = "Bearer "+tok;
  let res;
  try{
    res = await fetch(url, { method, headers,
            body: body!==undefined ? JSON.stringify(body) : undefined,
            signal: ctrl.signal, cache:"no-store" });
  } finally { clearTimeout(tid); }
  const buf = await res.arrayBuffer();
  let text = gbk ? gbk.decode(buf) : new TextDecoder().decode(buf);  // 韌體 charset=GBK
  text = cleanDirtyJSON(text);
  let data;
  try{ data = text ? JSON.parse(text) : {}; }
  catch(e){ throw new ApiError("RESP_PARSE", "設備回應格式異常", text.slice(0,120)); }
  // 韌體 bug 修補 (需求單 FW-02b)：/get/device/status 因少了 sip_status 收尾 }，device_info /
  //   network_info 被誤巢進 sip_status（cleanDirtyJSON 補的 } 只讓它可解析、未解套）。解析後若
  //   root 缺而 sip_status 內有，hoist 回 root（paintDashboard 讀 st.device_info / st.network_info）。
  //   對已修韌體（兩者已在 root）條件不成立、不誤動。真機 .147 實測確認生效。
  if (data && typeof data === "object" && data.sip_status && typeof data.sip_status === "object") {
    for (const k of ["device_info", "network_info"]) {
      if (data[k] === undefined && data.sip_status[k] !== undefined) {
        data[k] = data.sip_status[k];
        delete data.sip_status[k];
      }
    }
  }
  return data;
}

class ApiError extends Error{
  constructor(code,msg,detail){ super(msg||code); this.code=code; this.detail=detail||""; }
}

function api(method, path, body){
  // 串接到佇列：同一時間只送一個請求給設備
  const tok = Session.token, base = Session.base;          // 排隊當下快照 token/base（避免執行時已被登出清除 → #1）
  const maxAttempts = (method==="GET") ? CFG.REQ_RETRY : 0; // 只重試冪等 GET；POST timeout 不重送（避免重複撥號/改網路 → #6）
  const run = async ()=>{
    let lastErr;
    for(let attempt=0; attempt<=maxAttempts; attempt++){
      try{
        const data = await rawRequest(method, path, body, tok, base);
        if(data && data.status==="error"){
          const code = data.error_code || "ERR";
          if(code==="A002" || code==="A003"){          // token 過期/無效
            handleAuthExpired(); throw new ApiError(code, data.details||"登入逾時，請重新登入");
          }
          throw new ApiError(code, data.message||"操作失敗", data.details);
        }
        return data;
      }catch(e){
        lastErr = e;
        if(e instanceof ApiError && e.code!=="RESP_PARSE") break;   // 業務錯誤不重試
        if(e.name==="AbortError") lastErr = new ApiError("TIMEOUT","設備回應逾時");
      }
    }
    throw lastErr;
  };
  _chain = _chain.then(run, run);   // 不論前一個成敗都繼續排隊
  return _chain;
}
const GET  = (p)=>api("GET", p);
const POST = (p,b)=>api("POST", p, b===undefined?{}:b);

/* ══════════════════════════════════════════════════════════════════
   2. 安全：閒置登出、登入鎖定、認證過期
   ══════════════════════════════════════════════════════════════════ */
let idleTimer=null;
function resetIdle(){
  if(!Session.token) return;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{ toast("warn","已自動登出","閒置逾時，基於安全已結束工作階段"); doLogout(false); },
                         CFG.IDLE_LOGOUT_MS);
}
["click","keydown","mousemove","touchstart"].forEach(ev=>
  document.addEventListener(ev, ()=>resetIdle(), {passive:true}));

function handleAuthExpired(){
  if(!Session.token) return;
  Session.clear(); stopPolling();
  toast("err","工作階段已失效","Token 已過期或被其他登入取代，請重新登入");
  showLogin();
}

const Lockout = {
  get(){ try{ return JSON.parse(localStorage.getItem("sip_lock")||"{}"); }catch(e){ return {}; } },
  set(o){ try{ localStorage.setItem("sip_lock", JSON.stringify(o)); }catch(e){} },
  fails(){ return this.get().fails||0; },
  remainMs(){ const o=this.get(); if(!o.until) return 0; return Math.max(0, o.until - Date.now()); },
  bump(){ const o=this.get(); o.fails=(o.fails||0)+1;
          if(o.fails>=CFG.MAX_LOGIN_TRIES){ o.until=Date.now()+CFG.LOCKOUT_MS; o.fails=0; }
          this.set(o); },
  reset(){ this.set({}); },
};

const $  = (s,r=document)=>r.querySelector(s);

const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function toast(type, title, desc=""){
  const el=document.createElement("div");
  el.className="toast "+(type||"");
  el.innerHTML=`<div class="tt">${esc(title)}</div>${desc?`<div class="td">${esc(desc)}</div>`:""}`;
  $("#toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(8px)";
                   setTimeout(()=>el.remove(),200); }, type==="err"?5200:3200);
}
function setConn(state,label){
  const b=$("#tb-conn"); if(!b) return;
  b.className="badge "+(state==="ok"?"ok":state==="err"?"err":"warn");
  b.innerHTML=`<span class="dot ${state==="ok"?"ok":state==="err"?"err":"warn"}"></span><span>${esc(label)}</span>`;
}
function pwStrength(pw){
  let s=0; if(pw.length>=CFG.PW_MIN_LEN) s++;
  if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw)) s++;
  if(/\d/.test(pw)) s++;
  if(/[^A-Za-z0-9]/.test(pw)) s++;
  if(pw.length>=12) s=Math.min(4,s+1);
  return Math.min(4,s);
}
function pwPolicyError(pw, user){
  if(pw.length<CFG.PW_MIN_LEN) return `密碼至少 ${CFG.PW_MIN_LEN} 個字元`;
  if(pw===CFG.DEFAULT_PASSWORD) return "不可使用預設密碼";
  if(user && pw===user) return "密碼不可與帳號相同";
  if(!/[A-Za-z]/.test(pw)||!/\d/.test(pw)) return "需同時包含英文字母與數字";
  return null;
}

function showLogin(){
  stopPolling();
  $("#screen-app").classList.add("hide");
  $("#screen-login").classList.remove("hide");
  $("#li-pass").value=""; $("#li-msg").textContent="";
  if(location.protocol==="http:"){
    $("#li-http-warn").textContent="⚠ 目前以 HTTP 明文連線，帳密與設定皆未加密傳輸，請僅於可信任的內部網路使用。";
  }
  refreshLockoutUI();
}
function refreshLockoutUI(){
  const rem=Lockout.remainMs();
  const btn=$("#li-submit"), msg=$("#li-msg");
  if(rem>0){
    btn.disabled=true;
    const upd=()=>{ const r=Lockout.remainMs();
      if(r<=0){ btn.disabled=false; msg.textContent=""; return; }
      btn.disabled=true;  // 鎖定期間維持禁用，避免被 submit 的 finally 重新啟用 (#11)
      msg.textContent=`登入失敗次數過多，請於 ${Math.ceil(r/1000)} 秒後再試`;
      setTimeout(upd,1000); };
    upd();
  } else btn.disabled=false;
}

$("#form-login").addEventListener("submit", async (e)=>{
  e.preventDefault();
  if(Lockout.remainMs()>0) return;
  const user=$("#li-user").value.trim();
  const pass=$("#li-pass").value;
  let host=$("#li-host").value.trim().replace(/\/+$/,"");
  if(host && !/^https?:\/\//i.test(host)) host="http://"+host;   // 容許只填 IP，自動補 http://
  Session.base = host;
  const btn=$("#li-submit"), msg=$("#li-msg"); msg.textContent="";
  if(!user||!pass){ msg.textContent="請輸入帳號與密碼"; return; }
  btn.disabled=true; btn.textContent="登入中…";
  try{
    const r = await rawRequest("POST","/auth/login",{username:user,password:pass});
    if(r.status!=="success" || !r.data || !r.data.token){
      throw new ApiError(r.error_code||"A001", r.details||r.message||"帳號或密碼錯誤");
    }
    Lockout.reset();
    Session.token = r.data.token;
    Session.user  = (r.data.user_info&&r.data.user_info.username) || user;
    Session.loginPassWasDefault = (pass===CFG.DEFAULT_PASSWORD);
    Session.save();
    enterApp();
  }catch(err){
    // 只有「帳密錯誤(A0xx)」才計入鎖定；連線/CORS/逾時不該消耗登入次數
    const authFail = err instanceof ApiError && /^A0/.test(err.code||"");
    if(authFail){
      Lockout.bump();
      const left = CFG.MAX_LOGIN_TRIES - Lockout.fails();
      msg.textContent = (err.detail||err.message||"帳號或密碼錯誤") +
          (Lockout.remainMs()>0 ? "" : `（剩餘 ${left} 次）`);
    }else{
      msg.textContent = "無法連線到設備：請確認位址含 http://、設備已開機，且本頁由設備自身或代理提供（跨來源會被 CORS 擋）";
    }
    refreshLockoutUI();
  }finally{ btn.textContent="登入"; btn.disabled = Lockout.remainMs()>0; }
});

function doLogout(callApi=true){
  if(callApi && Session.token){ POST("/auth/logout").catch(()=>{}); }
  Session.clear(); stopPolling(); clearTimeout(idleTimer);
  showLogin();
}

        multicast_address:a, multicast_port:p,
        enabled:chkd("mt-en"), audio_codec:val("mt-codec") }),"組播發送設定已儲存");
  };
  $("#pa-save").onclick=()=>saveGuard("#pa-save",()=>POST("/set/sip/parameters",{
     local_port:num("pa-local"), rtp_start_port:num("pa-rtps"), rtp_end_port:num("pa-rtpe"),
     rtp_timeout:num("pa-rtpt"), echo_cancellation:chkd("pa-echo") }),"SIP 參數已儲存");
  $("#cd-save").onclick=()=>{
     if(![chkd("cd-g722"),chkd("cd-opus"),chkd("cd-ulaw"),chkd("cd-alaw")].some(Boolean))
        return toast("err","至少需啟用一種編碼","");
     saveGuard("#cd-save",()=>POST("/set/sip/codecs",{
        g722:chkd("cd-g722"), opus:chkd("cd-opus"),
        g711_ulaw:chkd("cd-ulaw"), g711_alaw:chkd("cd-alaw") }),"音頻編碼已儲存");
  };
}

/* ══════════════════════════════════════════════════════════════════
   9. 視圖：網路 (改 IP → 倒數 + 重新導向)
   ══════════════════════════════════════════════════════════════════ */
async function renderNetwork(c){
  c.innerHTML=`<div class="page-h"><h2>網路設定</h2></div>
    <p class="page-sub">設備僅支援靜態 IP；變更後設備將自動重啟並套用</p><div id="nw-body">載入中…</div>`;
  let n;
  try{ n=await GET("/get/network/config"); }
  catch(e){ const b=$("#nw-body"); if(b) b.innerHTML=errBox("讀取網路設定失敗",e); return; }
  const body=$("#nw-body"); if(!body) return;   // 切頁/登出後 DOM 已不存在 (#5)
  body.innerHTML=`
   <div class="card"><h3>IP 設定<span class="ln"></span></h3>
     <div class="secbar"><span>⚠</span><span>此韌體僅支援 <b>靜態 IP</b>。儲存後連線會中斷，請確保新位址與本機同網段。</span></div>
     <div class="grid2">
       ${inp("nw-ip","IP 位址",n.ip_address)}
       ${inp("nw-mask","子網路遮罩",n.subnet_mask)}
       ${inp("nw-gw","預設閘道",n.gateway)}
       ${inp("nw-dns","DNS",n.dns)}
     </div>
     <div style="margin-top:14px"><button class="btn primary" id="nw-save">儲存並套用</button></div>
   </div>`;
  $("#nw-save").onclick=()=>{
    const ip=val("nw-ip");
    if(!/^(\d{1,3}\.){3}\d{1,3}$/.test(ip)) return toast("err","IP 格式錯誤","");
    confirmModal("變更網路設定",
      `設備將套用 IP <b>${esc(ip)}</b> 並重啟，目前連線會中斷。確定繼續？`,
      ()=>applyNetwork(ip));
  };
}
async function applyNetwork(newIp){
  try{
    await POST("/set/network/config",{ network_mode:"static", ip_address:newIp,
       subnet_mask:val("nw-mask"), gateway:val("nw-gw"), dns:val("nw-dns") });
  }catch(e){
    if(e.code!=="TIMEOUT"){ toast("err","設定失敗",e.detail||e.message); return; }
  }
  // 設備將重啟並切換 IP → 倒數後「探測可達才導向」
  // protocol：若由「設備位址」指定了絕對網址，沿用其 protocol；否則用目前頁面 (#7)
  let proto = location.protocol==="https:" ? "https:" : "http:";
  try{ if(Session.base) proto = new URL(Session.base).protocol; }catch(e){}
  const target=`${proto}//${newIp}/`;
  countdownOverlay(CFG.REBOOT_COUNTDOWN, "設備正在套用新網路設定",
     `套用後會自動探測 ${target} 並導向；若未自動跳轉，請點下方連結。`,
     ()=>probeAndGo(target), target);
}
async function probeAndGo(target){
  // no-cors 探測：成功 resolve 視為可達才跳轉；逾時則保留遮罩上的手動連結，不強制導向 (#7)
  for(let i=0;i<20;i++){
    try{ await fetch(target+"get/device/status",{mode:"no-cors",cache:"no-store"});
         location.href=target; return; }
    catch(e){ await new Promise(r=>setTimeout(r,1500)); }
  }
}

/* ══════════════════════════════════════════════════════════════════
   9b. 視圖：IO 觸點配置
   ══════════════════════════════════════════════════════════════════ */
// 動作類型（11 項，與需求單 §3.2 列舉一致）。「停用該腳」是 mode=disabled 的職責，action 不含 disabled，避免雙重語意
const IO_ACTION_TYPES = ["multicast_ptt","call_toggle","call_preset","hangup","answer","sos",
   "volume_up","volume_down","call_status","multicast_status","remote_control"];
// 中文顯示標籤（POST 送出的仍是上方英文代碼，契約不變）
const IO_ACTION_LABELS = { multicast_ptt:"按住廣播 (PTT)", call_toggle:"一鍵撥號／掛斷",
   call_preset:"撥打預設號碼", hangup:"掛斷", answer:"接聽", sos:"緊急求助 (SOS)",
   volume_up:"音量＋", volume_down:"音量－", call_status:"通話狀態輸出",
   multicast_status:"組播狀態輸出", remote_control:"遠端控制輸出" };
// 輸出型動作（僅限硬體允許輸出的腳）；input 模式綁這些也沒意義，反向擋
const IO_OUTPUT_ACTIONS = ["call_status","multicast_status","remote_control"];
const IO_MODE_PAIRS    = [["input","輸入"],["output","輸出"],["disabled","停用"]];
const IO_CONTACT_PAIRS = [["NO","常開 (NO)"],["NC","常閉 (NC)"]];
const IO_TRIGGER_PAIRS = [["edge","邊沿（按一下）"],["level","電平（按住）"],["long_press","長按"]];
// value/label 分離的下拉：option 帶 value=代碼、顯示中文；val() 讀 .value 仍回代碼
function selKV(id,label,v,pairs){ return `<div class="field"><label>${esc(label)}</label>
   <select class="input" id="${id}">${pairs.map(([val,txt])=>
     `<option value="${esc(val)}" ${val===v?"selected":""}>${esc(txt)}</option>`).join("")}</select></div>`; }
// 需要按鍵/接點觸發才有意義的「輸入型」動作；output 模式綁這些沒有意義，前端先擋一層
const IO_INPUT_TRIGGER_ACTIONS = ["multicast_ptt","call_toggle","call_preset","hangup","answer","sos","volume_up","volume_down"];
// 需要填號碼的動作類型（call_*／sos）；multicast_ptt 的 param 是尾音 ms，可留空
const IO_NUMBER_PARAM_ACTIONS = ["call_toggle","call_preset","sos"];

async function renderIO(c){
  c.innerHTML=`<div class="page-h"><h2>IO 觸點</h2></div>
    <p class="page-sub">5 路乾接點輸入／輸出，觸發動作與 SIP 通話 / 組播聯動</p><div id="io-body">載入中…</div>`;
  let cfg;
  try{ cfg=await GET("/get/io/config"); }
  catch(e){
    const b=$("#io-body"); if(!b) return;
    // 同組播監聽區頁：舊韌體對未知路徑回非 JSON（RESP_PARSE）＝尚未支援，顯示容錯卡而非紅色錯誤
    if(e instanceof ApiError && e.code==="RESP_PARSE"){
      b.innerHTML=`<div class="card"><h3>IO 觸點配置（5 路乾接點）<span class="ln"></span></h3>
        <p class="page-sub" style="margin:0">此韌體未回報 IO 設定，或尚未支援此功能。</p></div>`;
      return;
    }
    b.innerHTML=errBox("讀取 IO 設定失敗",e); return;
  }
  const body=$("#io-body"); if(!body) return;   // 切頁/登出後 DOM 已不存在 (#5)
  const list=Array.isArray(cfg.io_config)?cfg.io_config:[];   // 韌體未支援時為空陣列，卡片仍可顯示不崩潰
  if(!list.length){
    body.innerHTML=`<div class="card"><h3>IO 觸點配置（5 路乾接點）<span class="ln"></span></h3>
      <p class="page-sub" style="margin:0">此韌體未回報 IO 設定，或尚未支援此功能。</p></div>`;
    return;
  }
  body.innerHTML=`<div class="card"><h3>IO 觸點配置（5 路乾接點）<span class="ln"></span></h3>
    ${list.map(ioRow).join("")}
    <div style="margin-top:14px"><button class="btn primary" id="io-save">儲存 IO 設定</button>
      <span class="hint" style="margin-left:8px">儲存後即時生效、免重啟</span></div>
  </div>`;
  $("#io-save").onclick=()=>{
    for(const rec of list){
      const id=rec.id, mode=val(`io${id}-mode`), atype=val(`io${id}-atype`), aparam=val(`io${id}-aparam`);
      if(mode==="disabled") continue;   // 停用的腳不檢查動作綁定
      if(!atype)
        return toast("err",`IO${id} 未選動作`,"啟用的腳需選擇動作類型；若要停用此腳請把「模式」設為停用");
      if(mode==="output" && IO_INPUT_TRIGGER_ACTIONS.includes(atype))
        return toast("err",`IO${id} 設定衝突`,"output 模式不應綁定輸入型動作（PTT／撥號／SOS／接聽／音量），請確認設定");
      if(mode==="input" && IO_OUTPUT_ACTIONS.includes(atype))
        return toast("err",`IO${id} 設定衝突`,"input 模式不應綁定輸出型動作（通話／組播狀態、遠端控制輸出），請確認設定");
      if(IO_NUMBER_PARAM_ACTIONS.includes(atype) && !aparam)
        return toast("err",`IO${id} 缺少參數`,"此動作類型需要填入號碼參數");
    }
    saveGuard("#io-save",()=>POST("/set/io/config",{ io_config: list.map(rec=>({
       id:rec.id, mode:val(`io${rec.id}-mode`), contact:val(`io${rec.id}-contact`),
       trigger:val(`io${rec.id}-trigger`), debounce_ms:num(`io${rec.id}-debounce`),
       action:{ type:val(`io${rec.id}-atype`), param:val(`io${rec.id}-aparam`) } })) }),
       "IO 設定已儲存，即時生效、免重啟");
  };
}

function ioRow(rec){
  const id=rec.id, act=rec.action||{}, hasState=rec.state!=null;
  return `<div style="border-top:1px solid var(--line);padding-top:14px;margin-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <b>IO${esc(id)} · ${esc(rec.gpio||"—")}</b>
    </div>
    <div class="grid2">
      ${selKV(`io${id}-mode`,"模式",rec.mode,IO_MODE_PAIRS)}
      ${selKV(`io${id}-contact`,"接點類型",rec.contact,IO_CONTACT_PAIRS)}
      ${selKV(`io${id}-trigger`,"觸發方式",rec.trigger,IO_TRIGGER_PAIRS)}
      ${inp(`io${id}-debounce`,"防彈跳 (ms)",rec.debounce_ms,"number")}
      ${selKV(`io${id}-atype`,"動作類型",
         IO_ACTION_TYPES.includes(act.type)?act.type:"",
         // 韌體回空/未知 action 時，插入「（請選擇）」哨兵選項並選中它，避免 <select> 靜默 fallback 到第一項而把設定悄悄覆蓋
         (IO_ACTION_TYPES.includes(act.type)?[]:[["","（請選擇動作）"]]).concat(IO_ACTION_TYPES.map(t=>[t,IO_ACTION_LABELS[t]])))}
      ${inp(`io${id}-aparam`,"參數（號碼／tail_ms）",act.param)}
    </div>
    ${kv(`IO${id} 即時狀態（唯讀）`, hasState?statusDot(rec.state===1?"觸發":"閒置"):"",
         hasState?(rec.state===1?"1（觸發）":"0（閒置）"):null)}
  </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   9c. 視圖：組播多監聽區（multi-zone，需求單《組播多監聽區需求單.md》定案）
   ══════════════════════════════════════════════════════════════════ */
const MZ_COUNT = 16;                                    // 需求單 §一：區數定死 16，非可配置
const MZ_CODEC_PAIRS = [["G.711U","G.711 µ-law"],["G.722","G.722"]];

async function renderMulticastZones(c){
  c.innerHTML=`<div class="page-h"><h2>組播監聽區</h2></div>
    <p class="page-sub">16 區多監聽區，依優先權即時搶佔、不混音；zone 1 亦可於「SIP / 組播」頁快速設定</p>
    <div id="mz-body">載入中…</div>`;
  let cfg;
  try{ cfg=await GET("/get/sip/multicast/zones"); }
  catch(e){
    const b=$("#mz-body"); if(!b) return;
    // 舊韌體無此端點：對未知路徑回非 JSON（404 頁/純文字）→ RESP_PARSE。
    // 這是「尚未支援」而非故障，顯示容錯卡；TIMEOUT/認證/業務錯誤照舊紅色報錯。
    if(e instanceof ApiError && e.code==="RESP_PARSE"){
      b.innerHTML=`<div class="card"><h3>組播監聽區（16 區）<span class="ln"></span></h3>
        <p class="page-sub" style="margin:0">此韌體未回報多監聽區設定，或尚未支援此功能。</p></div>`;
      return;
    }
    b.innerHTML=errBox("讀取組播監聽區設定失敗",e); return;
  }
  const body=$("#mz-body"); if(!body) return;   // 切頁/登出後 DOM 已不存在 (#5，同 renderIO 模式)
  const raw=Array.isArray(cfg.zones)?cfg.zones:[];   // 韌體未支援時為空陣列，卡片仍可顯示不崩潰
  if(!raw.length){
    body.innerHTML=`<div class="card"><h3>組播監聽區（16 區）<span class="ln"></span></h3>
      <p class="page-sub" style="margin:0">此韌體未回報多監聽區設定，或尚未支援此功能。</p></div>`;
    return;
  }
  // 韌體只回已配置區數時，補滿至 16 筆（zone_id 缺漏補停用佔位列），避免半張表無法新增
  const byId=new Map(raw.filter(z=>z&&z.zone_id!=null).map(z=>[z.zone_id,z]));
  const zones=[];
  for(let i=1;i<=MZ_COUNT;i++)
    zones.push(byId.get(i)||{zone_id:i,multicast_address:"",multicast_port:"",priority:"",enabled:false,audio_codec:""});

  body.innerHTML=`<div class="card"><h3>組播監聽區（16 區）<span class="ln"></span></h3>
    <div id="mz-prio-warn"></div>
    ${zones.map(mzRow).join("")}
    <div style="margin-top:14px"><button class="btn primary" id="mz-save">儲存全部監聽區</button>
      <span class="hint" style="margin-left:8px">整表覆寫、儲存後即時生效免重啟</span></div>
  </div>`;

  for(const z of zones){
    const el=$(`#mz${z.zone_id}-prio`); if(el) el.addEventListener("input", checkMzPriority);
    const en=$(`#mz${z.zone_id}-en`); if(en) en.addEventListener("change", checkMzPriority);
  }
  checkMzPriority();

  $("#mz-save").onclick=()=>{
    const rows=[];
    for(const z of zones){
      const id=z.zone_id, en=chkd(`mz${id}-en`), addr=val(`mz${id}-addr`),
            port=num(`mz${id}-port`), prio=num(`mz${id}-prio`), codec=val(`mz${id}-codec`);
      // 全空＝尚未配置的佔位列，停用時可略過驗證直接送出；一旦有任何欄位曾填值，
      // 即使目前停用也要走完整驗證，避免半成品垃圾值殘留、日後重新啟用時才炸開 (需求單 §四 4.2)
      const touched = en || !!addr || !!port || !!prio || !!codec;
      if(touched){
        const first=+addr.split(".")[0];
        if(!(addr && first>=224 && first<=239))
          return toast("err",`Zone ${id} 組播位址錯誤`,"必須介於 224.x.x.x – 239.x.x.x");
        if(!(Number.isInteger(port) && port>=1024 && port<=65535))
          return toast("err",`Zone ${id} 埠錯誤`,"必須介於 1024 – 65535");
        if(!(Number.isInteger(prio) && prio>=1 && prio<=MZ_COUNT))
          return toast("err",`Zone ${id} 優先權錯誤`,`必須介於 1 – ${MZ_COUNT} 的整數`);
        if(!codec)
          return toast("err",`Zone ${id} 未選編碼`,"已填入位址／埠／優先權的區需選擇音頻編碼；若不使用此區請清空全部欄位");
      }
      rows.push({ zone_id:id, multicast_address:addr, multicast_port:port||0,
                  priority:prio||0, enabled:en, audio_codec:codec||"G.722" });
    }
    // 全域優先權唯一性（僅計入已啟用區，同需求單 §一）——伺服器端仍會再驗一次，前端先擋一層
    const seen=new Map(), dup=[];
    for(const r of rows){ if(!r.enabled) continue;
      if(seen.has(r.priority)) dup.push(r.priority); else seen.set(r.priority, r.zone_id); }
    if(dup.length)
      return toast("err","優先權重複",`優先權 ${[...new Set(dup)].join("、")} 被多個已啟用區使用，需全域唯一`);
    saveGuard("#mz-save",()=>POST("/set/sip/multicast/zones",{ zones: rows }),"組播監聽區已儲存");
  };
}

function mzRow(z){
  const id=z.zone_id;
  // 韌體回空/未知 codec 時插入「（請選擇）」哨兵並選中，避免 <select> 靜默 fallback 到第一項覆蓋現場設定 (同 IO 頁教訓)
  const codecPairs = MZ_CODEC_PAIRS.some(([v])=>v===z.audio_codec) ? MZ_CODEC_PAIRS
    : [["","（請選擇編碼）"]].concat(MZ_CODEC_PAIRS);
  return `<div style="border-top:1px solid var(--line);padding-top:14px;margin-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <b>Zone ${esc(id)}</b>${id===1?'<span class="hint">＝SIP / 組播頁「組播接收」同一份設定</span>':""}
    </div>
    <div class="grid2">
      ${inp(`mz${id}-addr`,"組播位址 (224–239)",z.multicast_address)}
      ${inp(`mz${id}-port`,"組播埠 (1024–65535)",z.multicast_port,"number")}
      ${inp(`mz${id}-prio`,"優先權 (1–16，全域唯一，數字越小優先權越高)",z.priority,"number")}
      ${selKV(`mz${id}-codec`,"音頻編碼", MZ_CODEC_PAIRS.some(([v])=>v===z.audio_codec)?z.audio_codec:"", codecPairs)}
    </div>
    ${chk(`mz${id}-en`,"啟用此監聽區",z.enabled)}
  </div>`;
}

// 即時掃描全部 16 區，已啟用區之間 priority 重複者標紅並於卡頭列出警示（不阻擋輸入，儲存時才擋）
function checkMzPriority(){
  const warn=$("#mz-prio-warn"); if(!warn) return;
  const seen=new Map(), dupPriorities=new Set();
  for(let i=1;i<=MZ_COUNT;i++){
    const enEl=$(`#mz${i}-en`);
    if(!enEl || !enEl.checked) continue;
    const p=num(`mz${i}-prio`);
    if(!p) continue;
    if(seen.has(p)) dupPriorities.add(p); else seen.set(p, i);
  }
  for(let i=1;i<=MZ_COUNT;i++){
    const el=$(`#mz${i}-prio`); if(!el) continue;
    const enEl=$(`#mz${i}-en`);
    el.classList.toggle("bad", !!(enEl && enEl.checked && dupPriorities.has(Number(el.value))));
  }
  warn.innerHTML = dupPriorities.size
    ? `<div class="hint" style="color:var(--err);margin-bottom:6px">⚠ 優先權重複：${
        [...dupPriorities].sort((a,b)=>a-b).join("、")}（已啟用區的優先權須全域唯一，儲存前請修正）</div>`
    : "";
}

/* ══════════════════════════════════════════════════════════════════
   10. 視圖：系統維護
   ══════════════════════════════════════════════════════════════════ */
async function renderSystem(c){
  c.innerHTML=`<div class="page-h"><h2>系統維護</h2></div>
    <p class="page-sub">系統資源、安全與設備重啟</p>
    <div class="grid3" id="sys-stats"></div>
    <div class="card"><h3>系統資訊<span class="ln"></span></h3><div id="sys-info">載入中…</div></div>
    <div class="card"><h3>安全<span class="ln"></span></h3>
      <div class="kv"><span class="k">目前帳號</span><span class="v">${esc(Session.user)}</span></div>
      <div class="kv"><span class="k">連線加密</span><span class="v">${location.protocol==="https:"
         ?'<span class="badge ok">HTTPS</span>':'<span class="badge warn">HTTP 明文</span>'}</span></div>
      <div class="kv"><span class="k">工作階段</span><span class="v">閒置 ${CFG.IDLE_LOGOUT_MS/60000} 分自動登出</span></div>
      <div style="margin-top:14px"><button class="btn" id="sys-pw">修改管理密碼</button></div>
    </div>
    <div class="card"><h3>重啟設備<span class="ln"></span></h3>
      <p class="hint">重啟期間設備離線，所有通話與組播將中斷，約需 ${CFG.REBOOT_COUNTDOWN} 秒。</p>
      <button class="btn danger" id="sys-reboot">重新啟動設備</button>
    </div>`;
  $("#sys-pw").onclick=()=>renderChangePassword(false);
  $("#sys-reboot").onclick=()=>confirmModal("重新啟動設備",
     "確定要立即重啟設備嗎？重啟期間將無法提供服務。",()=>doReboot());
  try{
    const s=await GET("/system/info");
    const stats=$("#sys-stats"), info=$("#sys-info"); if(!info) return;  // 切頁/登出後 DOM 已不存在 (#5)
    if(stats) stats.innerHTML=[ gaugeCard("CPU",+s.cpu_usage||0,"%"),
       gaugeCard("記憶體",+s.memory_usage||0,"%"), statCard("溫度",s.temperature,"°C") ].join("");
    info.innerHTML = kv("CPU 使用率","",(s.cpu_usage??"—")+" %") +
       kv("記憶體使用","",(s.memory_usage??"—")+" %") + kv("磁碟使用","",(s.disk_usage??"—")+" %") +
       kv("溫度","",(s.temperature??"—")+" °C") + kv("運行時間","",s.uptime);
  }catch(e){ const info=$("#sys-info"); if(info) info.innerHTML=errBox("讀取系統資訊失敗",e); }
}
async function doReboot(){
  try{ await POST("/system/restart",{confirm:true}); }
  catch(e){ if(e.code!=="TIMEOUT"){ toast("err","重啟指令失敗",e.detail||e.message); return; } }
  countdownOverlay(CFG.REBOOT_COUNTDOWN,"設備重新啟動中","請稍候，完成後將自動重新整理頁面",
     ()=>location.reload());
}

/* ══════════════════════════════════════════════════════════════════
   11. 修改密碼 (forced=true 為預設密碼強制流程，不可跳過)
   ══════════════════════════════════════════════════════════════════ */
function renderChangePassword(forced){
  const c=$("#content");
  $$(".nav-item").forEach(n=>n.classList.remove("active"));
  stopPolling();
  c.innerHTML=`
   <div class="page-h"><h2>${forced?"設定新密碼":"修改管理密碼"}</h2></div>
   <p class="page-sub">${forced?"偵測到仍在使用預設密碼，請先設定專屬的管理密碼":"變更後請使用新密碼重新登入"}</p>
   <div class="card" style="max-width:460px">
     ${forced?"":pwInp("cp-old","目前密碼","")}
     <div class="field"><label>新密碼</label>
       <div class="pw-wrap"><input class="input" id="cp-new" type="password" autocomplete="new-password">
         <button type="button" class="eye" data-eye="cp-new">顯示</button></div>
       <div class="pwbars" id="cp-bars"><i></i><i></i><i></i><i></i></div>
       <div class="hint">至少 ${CFG.PW_MIN_LEN} 字元，需含英文與數字，勿用預設密碼。</div>
     </div>
     <div class="field"><label>確認新密碼</label>
       <input class="input" id="cp-new2" type="password" autocomplete="new-password"></div>
     <div id="cp-msg" class="hint" style="color:var(--err);min-height:16px"></div>
     <div style="margin-top:6px">
       <button class="btn primary" id="cp-save">${forced?"設定並繼續":"確認修改"}</button>
       ${forced?"":'<button class="btn" id="cp-cancel" style="margin-left:8px">取消</button>'}
     </div>
   </div>`;
  $$("[data-eye]",c).forEach(b=>b.addEventListener("click",()=>{
    const i=$("#"+b.dataset.eye); const sh=i.type==="password";
    i.type=sh?"text":"password"; b.textContent=sh?"隱藏":"顯示"; }));
  const np=$("#cp-new");
  np.addEventListener("input",()=>{ const s=pwStrength(np.value);
     $("#cp-bars").className="pwbars s"+s; });
  if(!forced) $("#cp-cancel").onclick=()=>navigate(currentView||"dashboard");
  $("#cp-save").onclick=async ()=>{
    const oldp = forced ? CFG.DEFAULT_PASSWORD : val("cp-old");
    const n1=val("cp-new"), n2=val("cp-new2"), msg=$("#cp-msg"); msg.textContent="";
    if(!forced && !oldp){ msg.textContent="請輸入目前密碼"; return; }
    const perr=pwPolicyError(n1, Session.user);
    if(perr){ msg.textContent=perr; return; }
    if(n1!==n2){ msg.textContent="兩次輸入的新密碼不一致"; return; }
    const btn=$("#cp-save"); btn.disabled=true; btn.textContent="處理中…";
    try{
      await POST("/auth/change_password",{old_password:oldp,new_password:n1});
      Session.loginPassWasDefault=false; Session.save();
      toast("ok","密碼已更新","為了安全，請使用新密碼重新登入");
      doLogout(true);
    }catch(e){
      msg.textContent = e.detail||e.message||"修改失敗";
      btn.disabled=false; btn.textContent=forced?"設定並繼續":"確認修改";
    }
  };
}

/* ══════════════════════════════════════════════════════════════════
   12. 共用 UI 元件 / 表單 helper
   ══════════════════════════════════════════════════════════════════ */
function inp(id,label,v,type="text"){ return `<div class="field"><label>${esc(label)}</label>
   <input class="input" id="${id}" type="${type}" value="${esc(v??"")}"></div>`; }
function pwInp(id,label,v){ return `<div class="field"><label>${esc(label)}</label>
   <div class="pw-wrap"><input class="input" id="${id}" type="password" value="${esc(v??"")}" autocomplete="off">
   <button type="button" class="eye" data-eye-dyn="${id}">顯示</button></div></div>`; }
function sel(id,label,v,opts){ return `<div class="field"><label>${esc(label)}</label>
   <select class="input" id="${id}">${opts.map(o=>`<option ${o===v?"selected":""}>${esc(o)}</option>`).join("")}</select></div>`; }
function chk(id,label,v){ return `<label class="toggle" style="margin:8px 16px 8px 0">
   <input type="checkbox" id="${id}" ${v?"checked":""}><span>${esc(label)}</span></label>`; }
function val(id){ const e=$("#"+id); return e?e.value.trim():""; }
function num(id){ const e=$("#"+id); return e?Number(e.value):0; }
function chkd(id){ const e=$("#"+id); return !!(e&&e.checked); }
function errBox(t,e){ return `<div class="secbar" style="background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.35);color:var(--err)">
   <span>✕</span><span>${esc(t)}：${esc(e.detail||e.message||e.code||"未知錯誤")}</span></div>`; }

// 動態插入的密碼眼睛 (表單 helper 產生的)
document.addEventListener("click",(e)=>{
  const b=e.target.closest("[data-eye-dyn]"); if(!b) return;
  const i=$("#"+b.getAttribute("data-eye-dyn")); if(!i) return;
  const sh=i.type==="password"; i.type=sh?"text":"password"; b.textContent=sh?"隱藏":"顯示";
});

async function saveGuard(btnSel, fn, okMsg){
  const btn=$(btnSel); if(!btn) return;
  const old=btn.textContent; btn.disabled=true; btn.textContent="儲存中…";
  try{ await fn(); toast("ok","已儲存",okMsg||""); }
  catch(e){ toast("err","儲存失敗",e.detail||e.message||e.code); }
  finally{ btn.disabled=false; btn.textContent=old; }
}

function confirmModal(title, html, onYes){
  const back=document.createElement("div"); back.className="modal-back";
  back.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><p>${html}</p>
     <div class="acts"><button class="btn" data-no>取消</button>
       <button class="btn primary" data-yes>確定</button></div></div>`;
  document.body.appendChild(back);
  const close=()=>back.remove();
  back.querySelector("[data-no]").onclick=close;
  back.onclick=(e)=>{ if(e.target===back) close(); };
  back.querySelector("[data-yes]").onclick=()=>{ close(); onYes&&onYes(); };
}

function countdownOverlay(sec, title, desc, onDone, link){
  const ov=document.createElement("div"); ov.id="overlay";
  ov.innerHTML=`<div class="ring"></div><div class="ov-t">${esc(title)}</div>
     <div class="ov-d">${esc(desc)}</div><div class="ov-c" id="ov-c">${sec}</div>
     ${link?`<a class="btn" href="${esc(link)}">立即前往新位址</a>`:""}`;
  document.body.appendChild(ov);
  let n=sec; const t=setInterval(()=>{ n--; const e=$("#ov-c"); if(e) e.textContent=Math.max(0,n);
     if(n<=0){ clearInterval(t); onDone&&onDone(); } }, 1000);
}

/* ══════════════════════════════════════════════════════════════════
   13. 啟動
   ══════════════════════════════════════════════════════════════════ */
(function init(){
  // 預填進階主機 (?host= 或既有 session)
  const qs=new URLSearchParams(location.search);
  Session.load();
  if(qs.get("host")) Session.base=qs.get("host").replace(/\/+$/,"");
  if(Session.base) $("#li-host").value=Session.base;

  if(Session.token){
    // 既有 session → 驗證 token 是否仍有效
    GET("/auth/verify").then(()=>enterApp())
      .catch(()=>{ Session.clear(); showLogin(); });
  }else{
    showLogin();
  }
})();
</script>
